services:
  oms-dispatcher:
    image: ghcr.io/1305a001-ctrl/oms-dispatcher:latest
    container_name: oms-dispatcher
    restart: unless-stopped
    env_file:
      - /srv/secrets/oms-dispatcher.env
    ports:
      - "127.0.0.1:8005:8005"
    networks:
      - infra-net

networks:
  infra-net:
    external: true
